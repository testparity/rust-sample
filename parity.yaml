settings:
  namespace_roots:
    src: src
    tests: tests
  source_extension: ".rs"
  test_suffix: "_test"
  test_extension: ".rs"
  namespace_separator: "::"

coverage_xml: coverage-xml
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "Rust Library"
    paths:
      source: "src"
      test: "tests"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
