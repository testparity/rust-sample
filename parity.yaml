settings:
  namespace_roots:
    src: src
    tests: tests
  source_extension: ".rs"
  test_suffix: "_test"
  test_extension: ".rs"
  namespace_separator: "::"

coverage_xml: clover.xml
min_coverage: 80

structure:
  - name: "Rust Library"
    paths:
      source: "src"
      test: "tests"
    rules:
      - minimum-coverage:
          min: 80
